<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Benchmarks - MagicByte ICT</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:#f5f7fa;color:#1f2937}

header{background:white;box-shadow:0 2px 10px rgba(0,0,0,.05);padding:20px 40px;display:flex;justify-content:space-between}
nav{display:flex;gap:20px}
nav a{text-decoration:none;color:#374151}

.hero{text-align:center;padding:80px 20px;background:linear-gradient(135deg,#1e3a8a,#2563eb);color:white}

.section{padding:60px 20px;max-width:1100px;margin:auto}
.card{background:white;padding:25px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,.05);margin-bottom:25px}

.controls{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
select,button{padding:10px;border-radius:6px;border:1px solid #ccc}
button{background:#2563eb;color:white;border:none;cursor:pointer}

canvas{margin-top:20px}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.5);
display:none;align-items:center;justify-content:center;
}

.modal-content{
background:white;padding:20px;border-radius:10px;width:90%;max-width:600px;
}

footer{text-align:center;padding:20px;color:#6b7280}
</style>

</head>

<body>

<header>
<h1>MagicByte ICT</h1>
<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="benchmarks.html">Benchmarks</a>
<a href="hardware.html">Hardware Tests</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">
<h2>Advanced Benchmark Platform</h2>
<p>Compare systems, analyse FPS, and explore performance data.</p>
</section>

<section class="section">

<div class="card">
<h3>Submit Benchmark</h3>
<button onclick="openModal()">Submit Your Results</button>
</div>

<div class="card">
<h3>Game Selection</h3>
<select id="gameSelect" onchange="updateCharts()"></select>
</div>

<div class="card">
<h3>Compare Systems</h3>
<div id="compareContainer"></div>
<button onclick="addCompare()">+ Add System</button>
<button onclick="updateCharts()">Compare</button>
</div>

<div class="card">
<h3>FPS Chart</h3>
<canvas id="fpsChart"></canvas>

<h3 style="margin-top:20px">Benchmark Scores</h3>
<canvas id="benchChart"></canvas>
</div>

</section>

<footer>© <span id="year"></span> MagicByte ICT</footer>

<!-- Modal -->

<div class="modal" id="modal">
<div class="modal-content">
<h3>Submit Benchmark Data</h3>
<iframe src="YOUR_MICROSOFT_FORM_LINK" width="100%" height="400" style="border:none;"></iframe>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const systems=[
{
name:"Gaming PC",
fps:{
Cyberpunk:{Low:120,Medium:90,High:75,Ultra:60},
Fortnite:{Low:160,Medium:130,High:110,Ultra:90}
},
bench:{CPU:14500,GPU:12000}
},
{
name:"Workstation",
fps:{
Cyberpunk:{Low:180,Medium:140,High:110,Ultra:85},
Fortnite:{Low:220,Medium:180,High:150,Ultra:120}
},
bench:{CPU:22000,GPU:18000}
}
];

const games=[...new Set(systems.flatMap(s=>Object.keys(s.fps)))];
const gameSelect=document.getElementById('gameSelect');

games.forEach(g=>gameSelect.innerHTML+=`<option>${g}</option>`);

const container=document.getElementById('compareContainer');

function addCompare(){
const select=document.createElement('select');
systems.forEach(s=>select.innerHTML+=`<option>${s.name}</option>`);
container.appendChild(select);
}

addCompare();
addCompare();

let fpsChart, benchChart;

function updateCharts(){
const selectedGame=gameSelect.value;
const selects=container.querySelectorAll('select');

const labels=["Low","Medium","High","Ultra"];

const datasets=Array.from(selects).map((sel,i)=>{
const sys=systems.find(s=>s.name===sel.value);
return{
label:sys.name,
data:Object.values(sys.fps[selectedGame])
};
});

if(fpsChart)fpsChart.destroy();
fpsChart=new Chart(document.getElementById('fpsChart'),{
type:'bar',
data:{labels,datasets}
});

if(benchChart)benchChart.destroy();
benchChart=new Chart(document.getElementById('benchChart'),{
type:'bar',
data:{
labels:["CPU","GPU"],
datasets:Array.from(selects).map(sel=>{
const sys=systems.find(s=>s.name===sel.value);
return{label:sys.name,data:Object.values(sys.bench)};
})
}
});
}

// modal
function openModal(){document.getElementById('modal').style.display='flex'}
function closeModal(){document.getElementById('modal').style.display='none'}

document.getElementById('year').textContent=new Date().getFullYear();

updateCharts();
</script>

</body>
</html>
